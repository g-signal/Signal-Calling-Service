name: Docker builds to Docker Hub

on:
  release:
    types: [published]

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: build frontend
        run: docker build . -f frontend/Dockerfile --build-arg rust_flags=-Ctarget-cpu=skylake -t calling-frontend

      - name: add specified tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: docker tag calling-frontend ${{ secrets.DOCKERHUB_USERNAME }}/signal-calling-frontend:${{ inputs.docker_tag }}

      - name: add version tag
        if: ${{ github.event_name != 'workflow_dispatch' && github.ref_type == 'tag' }}
        env:
          TAG: ${{ github.ref_name }}
        run: docker tag calling-frontend ${{ secrets.DOCKERHUB_USERNAME }}/signal-calling-frontend:${TAG:1}

      - name: add latest tag
        if: ${{ github.event_name != 'workflow_dispatch' && github.ref_type == 'branch' }}
        run: docker tag calling-frontend ${{ secrets.DOCKERHUB_USERNAME }}/signal-calling-frontend:latest

      - name: push frontend
        run: docker push --all-tags ${{ secrets.DOCKERHUB_USERNAME }}/signal-calling-frontend

  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: build backend
        run: docker build . -f backend/Dockerfile --build-arg rust_flags=-Ctarget-cpu=skylake -t calling-backend

      - name: add specified tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: docker tag calling-backend ${{ secrets.DOCKERHUB_USERNAME }}/signal-calling-backend:${{ inputs.docker_tag }}

      - name: add version tag
        if: ${{ github.event_name != 'workflow_dispatch' && github.ref_type == 'tag' }}
        env:
          TAG: ${{ github.ref_name }}
        run: docker tag calling-backend ${{ secrets.DOCKERHUB_USERNAME }}/signal-calling-backend:${TAG:1}

      - name: add latest tag
        if: ${{ github.event_name != 'workflow_dispatch' && github.ref_type == 'branch' }}
        run: docker tag calling-backend ${{ secrets.DOCKERHUB_USERNAME }}/signal-calling-backend:latest

      - name: push backend
        run: docker push --all-tags ${{ secrets.DOCKERHUB_USERNAME }}/signal-calling-backend

  build-bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: build bootstrap
        run: docker build . -f docker/bootstrap/Dockerfile -t calling-bootstrap

      - name: add specified tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: docker tag calling-bootstrap ${{ secrets.DOCKERHUB_USERNAME }}/signal-calling-bootstrap:${{ inputs.docker_tag }}

      - name: add version tag
        if: ${{ github.event_name != 'workflow_dispatch' && github.ref_type == 'tag' }}
        env:
          TAG: ${{ github.ref_name }}
        run: docker tag calling-bootstrap ${{ secrets.DOCKERHUB_USERNAME }}/signal-calling-bootstrap:${TAG:1}

      - name: add latest tag
        if: ${{ github.event_name != 'workflow_dispatch' && github.ref_type == 'branch' }}
        run: docker tag calling-bootstrap ${{ secrets.DOCKERHUB_USERNAME }}/signal-calling-bootstrap:latest

      - name: push bootstrap
        run: docker push --all-tags ${{ secrets.DOCKERHUB_USERNAME }}/signal-calling-bootstrap